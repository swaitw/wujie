name: npm publish

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or branch to publish, for example v2.0.0"
        required: true
        default: "master"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          check-latest: true
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: install
        run: pnpm i --filter "wujie-project" --filter "./packages/**" --frozen-lockfile

      - name: publish to npm
        run: |
          ./node_modules/.bin/lerna run prepack
          ./node_modules/.bin/lerna publish from-package --no-verify-access --ignore-scripts --create-release github -y
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
